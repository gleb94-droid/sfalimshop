<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="mugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#ff8c5a"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#0f0f0f"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.4"/>

  <!-- Mug body -->
  <path d="M12,22 L12,50 Q12,55 18,55 L38,55 Q44,55 44,50 L44,22 Z"
        fill="none" stroke="url(#mugGrad)" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Mug handle -->
  <path d="M44,30 Q57,30 57,38 Q57,47 44,47"
        fill="none" stroke="url(#mugGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Steam lines -->
  <path d="M20,16 Q22,10 20,4" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M28,14 Q30,8 28,2" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M36,16 Q38,10 36,4" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
</svg>
