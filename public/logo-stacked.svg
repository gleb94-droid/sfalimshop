<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700;1,900&amp;family=Heebo:wght@400;500;700&amp;display=swap');
      .brand-en { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 700; }
      .brand-he { font-family: 'Heebo', 'Assistant', sans-serif; font-weight: 500; }
      .meta { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 400; }
      .tracked { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 400; letter-spacing: 4px; }
    </style>
    <linearGradient id="mugGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#ff8c5a"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1614"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </radialGradient>
  </defs>

  <rect width="600" height="600" rx="28" fill="url(#bgGrad)"/>
  <rect x="1.5" y="1.5" width="597" height="597" rx="26.5" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.2"/>

  <line x1="285" y1="92" x2="315" y2="92" stroke="#FF6B35" stroke-width="1.3"/>
  <text x="300" y="120" text-anchor="middle" class="tracked" font-size="16" fill="#FF6B35" text-rendering="geometricPrecision">EST. 2026 · BE'ER SHEVA · ISRAEL</text>

  <text x="300" y="290" text-anchor="middle" class="brand-en" font-size="88" fill="#ffffff" text-rendering="geometricPrecision">Sfalim Shop</text>

  <text x="300" y="350" text-anchor="middle" class="brand-he" font-size="38" fill="#ffffff" text-rendering="geometricPrecision">ספלים שופ</text>

  <line x1="220" y1="395" x2="290" y2="395" stroke="#FF6B35" stroke-width="1.2"/>
  <circle cx="300" cy="395" r="3" fill="#FF6B35"/>
  <line x1="310" y1="395" x2="380" y2="395" stroke="#FF6B35" stroke-width="1.2"/>

  <text x="300" y="435" text-anchor="middle" class="brand-he" font-size="20" fill="#cfcfcf" letter-spacing="2" text-rendering="geometricPrecision">מעוצב לסגנון שלך</text>
  <text x="300" y="465" text-anchor="middle" class="meta" font-size="16" fill="#888888" text-rendering="geometricPrecision">Designed for Your Style</text>

  <circle cx="60" cy="540" r="3" fill="#FF6B35"/>
  <text x="76" y="546" class="tracked" font-size="13" fill="#aaaaaa" text-rendering="geometricPrecision">MUGS · SHIRTS · STICKERS</text>

  <text x="540" y="546" text-anchor="end" class="meta" font-size="14" fill="#aaaaaa" text-rendering="geometricPrecision">sfalimshop.com</text>
