     {e:"🌶️",t:"שוק / אוכל רחוב, אקשן וריחות",w:{en:2}},
     {e:"🥐",t:"בית קפה חמים עם בן/בת זוג",w:{el:1,wa:1}},
     {e:"🍣",t:"שף, אומאקאסה, חוויה ייחודית",w:{br:1,el:1}},
     {e:"👑",t:"שולחן VIP, הכל בולט וזוהר",w:{el:1,bo:1}}]}
  ];

  // ===== LOGIC =====
  const DIMS=['en','so','el','bo','br','wa'];
  const TIDX={en:0,so:1,el:2,bo:3,br:4,wa:5};
  const maxW={}; DIMS.forEach(d=>maxW[d]=0);
  QUESTIONS.forEach(q=>DIMS.forEach(d=>{let m=0;q.a.forEach(a=>{if((a.w[d]||0)>m)m=a.w[d];});maxW[d]+=m;}));
  let species=`any`;
  let idx=0,acc={},current=null;
  const $=id=>document.getElementById(id);
  function show(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(s).classList.add('active');window.scrollTo(0,0);}
  function start(){idx=0;acc={};DIMS.forEach(d=>acc[d]=0);species=`any`;show('question');render();}
  function render(){
    const q=QUESTIONS[idx];
    $('qcount').textContent='שאלה '+(idx+1)+' מתוך '+QUESTIONS.length;
    $('pfill').style.width=(idx/QUESTIONS.length*100)+'%';
    $('pfill').parentElement.setAttribute('aria-valuenow', Math.round(idx/QUESTIONS.length*100));
    $('qtext').textContent=q.q;
    const box=$('answers');box.innerHTML='';
    q.a.forEach(ans=>{const b=document.createElement('button');b.type='button';b.className='answer';b.innerHTML='<span>'+ans.t+'</span>';b.onclick=()=>pick(ans);box.appendChild(b);});
  }
  function pick(ans){if(ans.sp)species=ans.sp;DIMS.forEach(d=>acc[d]+=(ans.w[d]||0));idx++;if(idx<QUESTIONS.length)render();else finish();}
  function finish(){
    const u={};DIMS.forEach(d=>u[d]=maxW[d]?acc[d]/maxW[d]:0);
    const pool = species===`any` ? PETS : PETS.filter(p=>{
      const num = parseInt(p.s.substring(0,2),10);
      const isDog = num>=1 && num<=47;
      return species===`dog` ? isDog : !isDog;
    });
    const scored=pool.map(p=>{let dist=0;DIMS.forEach(d=>{const pn=(p.t[TIDX[d]]-1)/4;const diff=u[d]-pn;dist+=diff*diff;});return{p,dist};});
    // weighted pick: closest matches strongly favored, but all 70 reachable
    let wsum=0;const wts=scored.map(o=>{const w=1/Math.pow(o.dist+0.04,4);wsum+=w;return w;});
    let r=Math.random()*wsum,ci=0;
    for(let i=0;i<scored.length;i++){ci=i;r-=wts[i];if(r<=0)break;}
    current=scored[ci].p;
    $('pfill').style.width='100%';
    $('pfill').parentElement.setAttribute('aria-valuenow', 100);
    $('rimg').src=IMG_BASE+current.s+'-clean.webp';$('rimg').alt=current.n;
    $('rname').innerHTML=current.n+'<span class="ttl">'+current.ti+'</span>';
    $('rdesc').textContent=current.d;
    $('rcta').href=SHOP_URL+'/#pets/'+current.s;
    $('rcta').textContent='קח את ה'+current.n+' הביתה →';
    show('result');
    const _r=$('result');if(_r){_r.setAttribute('tabindex','-1');_r.focus();}
  }
  function restart(){show('start');}
  // ===== SHARE =====
  function shareUrl(){return QUIZ_URL||location.href.split('#')[0];}
  function shareText(){return 'גיליתי איזו דמות BLOOM אני: '+current.n+' — '+current.ti+'! '+current.em+'\nמה אתה? קח את המבחן הקצר:\n'+shareUrl();}
  function shareWA(){
    var t = encodeURIComponent(shareText());
    var isMobile = /android|iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isMobile) {
      window.location.href = 'whatsapp://send?text=' + t;
    } else {
      window.open('https://wa.me/?text=' + t, '_blank');
    }
  }
  function shareGen(){const data={title:'איזו דמות BLOOM אתה?',text:shareText(),url:shareUrl()};if(navigator.share)navigator.share(data).catch(()=>{});else copy(shareText());}
  function copy(t){if(navigator.clipboard)navigator.clipboard.writeText(t).then(toast,()=>fb(t));else fb(t);}
  function fb(t){const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e){}document.body.removeChild(ta);toast();}
  function toast(){const el=$('toast');el.textContent='הקישור הועתק! שתף עם חברים';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
  window.start=start;window.restart=restart;window.shareWA=shareWA;window.shareGen=shareGen;

  // ===== Accessibility widget (self-contained, IS 5568) =====
  (function(){
    var content=$('a11y-content'), fab=$('a11yFab'), panel=$('a11yPanel');
    var hcBtn=$('a11yHc'), hcMark=$('a11yHcMark'), sizeVal=$('a11ySizeVal');
    if(!content||!fab||!panel) return;
    var lastFocused=null, zoom=100, hc=false;
    try{ var z=parseInt(localStorage.getItem('sfq_a11y_zoom'),10); if(z>=80&&z<=140)zoom=z; hc=localStorage.getItem('sfq_a11y_hc')==='1'; }catch(e){}
    function applyZoom(){ content.style.zoom=(zoom/100); sizeVal.textContent=zoom+'%'; }
    function applyHc(){ content.classList.toggle('hc',hc); hcBtn.setAttribute('aria-pressed',hc?'true':'false'); hcMark.textContent=hc?'✓':'○'; }
    function save(){ try{ localStorage.setItem('sfq_a11y_zoom',String(zoom)); localStorage.setItem('sfq_a11y_hc',hc?'1':'0'); }catch(e){} }
    applyZoom(); applyHc();
    function focusables(){ return Array.prototype.slice.call(panel.querySelectorAll('a[href],button:not([disabled])')).filter(function(el){return el.offsetParent!==null;}); }
    function onKey(e){
      if(e.key==='Escape'){ e.stopPropagation(); close(); return; }
      if(e.key!=='Tab') return;
      var f=focusables(); if(!f.length){ e.preventDefault(); panel.focus(); return; }
      var first=f[0], last=f[f.length-1];
      if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
    }
    function open(){ lastFocused=document.activeElement; panel.hidden=false; fab.setAttribute('aria-expanded','true'); var f=focusables(); (f[0]||panel).focus(); document.addEventListener('keydown',onKey,true); }
    function close(){ panel.hidden=true; fab.setAttribute('aria-expanded','false'); document.removeEventListener('keydown',onKey,true); if(lastFocused&&lastFocused.focus){try{lastFocused.focus();}catch(e){}} }
    fab.addEventListener('click',function(){ panel.hidden?open():close(); });
    hcBtn.addEventListener('click',function(){ hc=!hc; applyHc(); save(); });
    $('a11ySizeDown').addEventListener('click',function(){ zoom=Math.max(80,zoom-10); applyZoom(); save(); });
    $('a11ySizeUp').addEventListener('click',function(){ zoom=Math.min(140,zoom+10); applyZoom(); save(); });
    $('a11yReset').addEventListener('click',function(){ zoom=100; hc=false; applyZoom(); applyHc(); save(); });
  })();
</script>
</body>
</html>
