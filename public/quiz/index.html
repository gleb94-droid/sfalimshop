   {s:"66_savannah",n:"סוואנה",ti:"החתול-נמר",em:"🌿",d:"גבוה, פראי ונועז — קרוב משפחה של נמר.",t:[5,3,4,5,4,3]},
   {s:"67_norwegian_forest",n:"יער נורווגי",ti:"לוחם היער",em:"🌲",d:"פרוותי, חזק ורגוע — נסיך מהיערות.",t:[3,3,4,3,3,4]},
   {s:"68_munchkin",n:"מנצ'קין",ti:"הקצרצר המקסים",em:"🐾",d:"רגליים קצרות, אישיות ענקית.",t:[3,4,3,3,3,4]},
   {s:"69_birman",n:"בירמן",ti:"הקדוש הרך",em:"💙",d:"עיניים כחולות, נפש עדינה, חן מלכותי.",t:[2,3,5,2,3,5]},
   {s:"70_devon_rex",n:"דבון רקס",ti:"השדון המתולתל",em:"🧚",d:"אוזניים ענקיות, סקרנות אינסופית, אופי של שדון.",t:[4,5,3,4,4,4]}
  ];

  // ===== 10 QUESTIONS ===== weights map to dims: en,so,el,bo,br,wa
  const QUESTIONS=[
   {q:"סוף שבוע מושלם בעיניך?",a:[
     {e:"🏔️",t:"הרפתקה בטבע",w:{en:2,bo:1}},
     {e:"🛋️",t:"ספה, סדרה וחטיפים",w:{wa:1,el:1}},
     {e:"🥂",t:"בראנץ' שיק עם חברים",w:{el:2,so:1}},
     {e:"🎉",t:"מסיבה עם המון אנשים",w:{so:2,en:1}}]},
   {q:"איך חברים מתארים אותך?",a:[
     {e:"❤️",t:"נאמן וחם",w:{wa:2}},
     {e:"😄",t:"מצחיק וחברתי",w:{so:2}},
     {e:"🎯",t:"חכם וממוקד",w:{br:2}},
     {e:"🕶️",t:"מסתורי ונועז",w:{bo:2}}]},
   {q:"הסטייל שלך?",a:[
     {e:"🤍",t:"קלאסי ואלגנטי",w:{el:2}},
     {e:"🌈",t:"צבעוני ובולט",w:{bo:2,so:1}},
     {e:"👟",t:"ספורטיבי ונוח",w:{en:1,wa:1}},
     {e:"🦄",t:"ייחודי ואקסצנטרי",w:{bo:1,br:1}}]},
   {q:"מה הכי חשוב לך?",a:[
     {e:"👨‍👩‍👧",t:"משפחה וחברים",w:{wa:2,so:1}},
     {e:"🧭",t:"חופש והרפתקה",w:{en:2,bo:1}},
     {e:"💎",t:"יוקרה ונוחות",w:{el:2}},
     {e:"🧠",t:"ללמוד ולהתפתח",w:{br:2}}]},
   {q:"במסיבה אתה...",a:[
     {e:"🎤",t:"מרכז העניינים",w:{so:2,bo:1}},
     {e:"💬",t:"מדבר עם כולם בחום",w:{so:1,wa:1}},
     {e:"🤫",t:"בפינה עם קרובים",w:{wa:1,br:1}},
     {e:"👀",t:"מתבונן בשקט מהצד",w:{el:1,br:1}}]},
   {q:"רמת האנרגיה שלך?",a:[
     {e:"⚡",t:"אינסופית, תמיד בתנועה",w:{en:2}},
     {e:"🏃",t:"פעיל אבל מאוזן",w:{en:1,wa:1}},
     {e:"😌",t:"רגוע ונינוח",w:{el:1,wa:1}},
     {e:"🦥",t:"שומר אנרגיה לדברים החשובים",w:{el:1,br:1}}]},
   {q:"איך אתה מקבל החלטות?",a:[
     {e:"🧮",t:"בהיגיון וניתוח",w:{br:2}},
     {e:"❤️",t:"עם הלב",w:{wa:2}},
     {e:"🎲",t:"ספונטני ונועז",w:{bo:2,en:1}},
     {e:"👑",t:"מה שהכי מתאים לי",w:{el:1,bo:1}}]},
   {q:"איזה וייב מדבר אליך?",a:[
     {e:"🌅",t:"חם וזהוב",w:{wa:2}},
     {e:"🌸",t:"צבעוני ושמח",w:{so:1,en:1}},
     {e:"🖤",t:"כהה ואלגנטי",w:{el:2,bo:1}},
     {e:"🌿",t:"טבעי ורגוע",w:{wa:1,el:1}}]},
   {q:"בחופשה אתה...",a:[
     {e:"🗺️",t:"מטייל ומגלה",w:{en:2,bo:1}},
     {e:"🏖️",t:"נח על החוף",w:{wa:1,el:1}},
     {e:"🏨",t:"מלון יוקרה ופינוקים",w:{el:2}},
     {e:"🎭",t:"חוויות ייחודיות",w:{bo:1,br:1,so:1}}]},
   {q:"בעל החיים האידיאלי שלך?",a:[
     {e:"🐕",t:"אנרגטי ושובב",w:{en:2}},
     {e:"😻",t:"רגוע ומפנק",w:{el:1,wa:1}},
     {e:"🧩",t:"חכם ומאתגר",w:{br:2}},
     {e:"👑",t:"דרמטי ומלכותי",w:{el:1,bo:1}}]}
  ];

  // ===== LOGIC =====
  const DIMS=['en','so','el','bo','br','wa'];
  const TIDX={en:0,so:1,el:2,bo:3,br:4,wa:5};
  const maxW={}; DIMS.forEach(d=>maxW[d]=0);
  QUESTIONS.forEach(q=>DIMS.forEach(d=>{let m=0;q.a.forEach(a=>{if((a.w[d]||0)>m)m=a.w[d];});maxW[d]+=m;}));
  let idx=0,acc={},current=null;
  const $=id=>document.getElementById(id);
  function show(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(s).classList.add('active');window.scrollTo(0,0);}
  function start(){idx=0;acc={};DIMS.forEach(d=>acc[d]=0);show('question');render();}
  function render(){
    const q=QUESTIONS[idx];
    $('qcount').textContent='שאלה '+(idx+1)+' מתוך '+QUESTIONS.length;
    $('pfill').style.width=(idx/QUESTIONS.length*100)+'%';
    $('qtext').textContent=q.q;
    const box=$('answers');box.innerHTML='';
    q.a.forEach(ans=>{const b=document.createElement('button');b.className='answer';b.innerHTML='<span class="e">'+ans.e+'</span><span>'+ans.t+'</span>';b.onclick=()=>pick(ans);box.appendChild(b);});
  }
  function pick(ans){DIMS.forEach(d=>acc[d]+=(ans.w[d]||0));idx++;if(idx<QUESTIONS.length)render();else finish();}
  function finish(){
    const u={};DIMS.forEach(d=>u[d]=maxW[d]?acc[d]/maxW[d]:0);
    const scored=PETS.map(p=>{let dist=0;DIMS.forEach(d=>{const pn=(p.t[TIDX[d]]-1)/4;const diff=u[d]-pn;dist+=diff*diff;});return{p,dist};});
    // weighted pick: closest matches strongly favored, but all 70 reachable
    let wsum=0;const wts=scored.map(o=>{const w=1/Math.pow(o.dist+0.04,4);wsum+=w;return w;});
    let r=Math.random()*wsum,ci=0;
    for(let i=0;i<scored.length;i++){ci=i;r-=wts[i];if(r<=0)break;}
    current=scored[ci].p;
    $('pfill').style.width='100%';
    $('rimg').src=IMG_BASE+current.s+'-clean.webp';$('rimg').alt=current.n;
    $('rname').innerHTML=current.em+' '+current.n+'<span class="ttl">'+current.ti+'</span>';
    $('rdesc').textContent=current.d;
    $('rcta').href=SHOP_URL+'/#pets/'+current.s;
    $('rcta').textContent='🎁 קח את ה'+current.n+' הביתה →';
    show('result');
  }
  function restart(){show('start');}
  // ===== SHARE =====
  function shareUrl(){return QUIZ_URL||location.href.split('#')[0];}
  function shareText(){return '🐾 גיליתי איזו דמות BLOOM אני: '+current.n+' — '+current.ti+'! '+current.em+'\nמה אתה? קח את המבחן הקצר 👇\n'+shareUrl();}
  function shareWA(){
    var t = encodeURIComponent(shareText());
    var isMobile = /android|iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isMobile) {
      window.location.href = 'whatsapp://send?text=' + t;
    } else {
      window.open('https://wa.me/?text=' + t, '_blank');
    }
  }
  function shareGen(){const data={title:'איזו דמות BLOOM אתה?',text:shareText(),url:shareUrl()};if(navigator.share)navigator.share(data).catch(()=>{});else copy(shareText());}
  function copy(t){if(navigator.clipboard)navigator.clipboard.writeText(t).then(toast,()=>fb(t));else fb(t);}
  function fb(t){const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e){}document.body.removeChild(ta);toast();}
  function toast(){const el=$('toast');el.textContent='הקישור הועתק! שתף עם חברים 🐾';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
  window.start=start;window.restart=restart;window.shareWA=shareWA;window.shareGen=shareGen;
</script>
